# config/scenarios.yaml
# =============================================================================
# 场景规则配置 (Scenario Rules Configuration)
# 对应 PRD 2.5 — 亲密关系与商务社交场景适配 (Scenario Logic)
# =============================================================================
#
# 本文件定义场景识别的关键词权重、阈值规则与对应的 Prompt 策略。
# 由 brain/scenario/detector.py 在运行时加载。
# 修改此文件后无需重启，下次会话自动生效。
# =============================================================================

version: "1.0"

# ---------------------------------------------------------------------------
# 场景类型定义
# ---------------------------------------------------------------------------
scenarios:

  # ── 商务场景 ────────────────────────────────────────────────────────────
  business:
    label: "商务"
    description: "职业/商业关系对话，侧重专业术语、行动项补全与逻辑严密性"
    color_tag: "#4A90E2"         # UI 场景标签颜色（蓝色）
    icon: "💼"

    # 触发关键词（权重越高对判断贡献越大）
    trigger_keywords:
      high_weight:              # 权重 3 — 强商务信号
        - "需求"
        - "方案"
        - "对接"
        - "合同"
        - "报价"
        - "预算"
        - "交付"
        - "里程碑"
        - "验收"
        - "甲方"
        - "乙方"
        - "排期"
        - "上线"
        - "技术评审"
        - "架构"
        - "主包"
      medium_weight:            # 权重 2 — 中等商务信号
        - "会议"
        - "沟通"
        - "确认"
        - "跟进"
        - "进度"
        - "反馈"
        - "资源"
        - "支持"
        - "协作"
        - "文档"
        - "接口"
        - "测试"
      low_weight:               # 权重 1 — 弱商务信号（需结合其他信号）
        - "了解"
        - "考虑"
        - "建议"
        - "优化"
        - "问题"

    # 负向关键词（出现这些词时降低商务场景得分）
    negative_keywords:
      - "老婆"
      - "宝贝"
      - "宠物"
      - "今晚吃"
      - "想你"
      - "哈哈"

    # 判定阈值（综合得分 >= threshold 时判定为此场景）
    threshold: 6

    # 对应的 Prompt 模板路径
    prompt_template: "brain/scenario/prompt_templates/business.md"

    # 推荐模型（对应 config/models.yaml 中的 key）
    recommended_model: "business"

    # 默认语气档位
    default_tone: "professional"

    # Ghost Text 补全策略
    completion_strategy:
      max_suggestions: 3        # 最多生成候选建议数
      max_tokens: 120           # 每条建议的最大 Token 数
      temperature: 0.5          # 较低温度，保证逻辑严密
      include_action_items: true  # 是否强制包含行动项（时间节点/责任人）
      formality_level: "high"   # 正式程度：high / medium / low

  # ── 亲密场景 ────────────────────────────────────────────────────────────
  intimate:
    label: "亲密"
    description: "家庭/恋人/挚友对话，侧重情感共鸣、幽默联想与生活化表达"
    color_tag: "#E24A6E"         # UI 场景标签颜色（粉红色）
    icon: "💕"

    trigger_keywords:
      high_weight:
        - "老婆"
        - "老公"
        - "宝贝"
        - "媳妇"
        - "亲爱的"
        - "婚礼"
        - "宠物"
        - "想你"
        - "爱你"
        - "家里"
        - "爸妈"
      medium_weight:
        - "今晚"
        - "吃饭"
        - "周末"
        - "一起"
        - "开心"
        - "难过"
        - "累了"
        - "加油"
        - "好久不见"
        - "最近怎么样"
      low_weight:
        - "哈哈"
        - "哈哈哈"
        - "嗯嗯"
        - "好的"
        - "可以"

    negative_keywords:
      - "合同"
      - "甲方"
      - "报价"
      - "预算"
      - "架构"
      - "交付"

    threshold: 5

    prompt_template: "brain/scenario/prompt_templates/intimate.md"

    recommended_model: "intimate"

    default_tone: "warm"

    completion_strategy:
      max_suggestions: 2
      max_tokens: 60
      temperature: 0.85         # 较高温度，增加表达多样性与自然感
      include_action_items: false
      formality_level: "low"
      enable_humor: true        # 允许幽默联想
      enable_empathy: true      # 优先情绪共鸣

  # ── 泛社交场景（兜底） ───────────────────────────────────────────────────
  social:
    label: "社交"
    description: "普通朋友/同学/同事，无明确商务或亲密信号时的默认场景"
    color_tag: "#7A7A9D"         # UI 场景标签颜色（灰紫色）
    icon: "👋"

    # 无触发关键词，作为兜底场景使用
    prompt_template: "brain/scenario/prompt_templates/business.md"  # 暂用商务模板，后续独立
    recommended_model: "default"
    default_tone: "warm"

    completion_strategy:
      max_suggestions: 2
      max_tokens: 80
      temperature: 0.7
      include_action_items: false
      formality_level: "medium"

  # ── 未知/待分类 ──────────────────────────────────────────────────────────
  unknown:
    label: "未知"
    description: "联系人尚未分类或信号不足，等待更多对话数据积累"
    color_tag: "#555566"
    icon: "❓"

    prompt_template: "brain/scenario/prompt_templates/business.md"
    recommended_model: "default"
    default_tone: "professional"

    completion_strategy:
      max_suggestions: 1
      max_tokens: 60
      temperature: 0.6
      include_action_items: false
      formality_level: "medium"

# ---------------------------------------------------------------------------
# 场景识别引擎配置
# ---------------------------------------------------------------------------
detector:

  # 主要识别信号来源与权重分配
  signal_weights:
    contact_tier: 0.5         # 联系人等级标签（最强信号）
    keyword_match: 0.35       # 实时关键词匹配
    rag_topic_hit: 0.15       # RAG 知识库命中主题

  # 滑动窗口：分析最近 N 条消息的关键词
  analysis_window: 5          # 最近 5 条消息

  # 置信度阈值：低于此值时降级到 UNKNOWN 场景
  min_confidence: 0.40

  # 场景切换防抖：避免频繁切换
  switch_debounce_messages: 3   # 新场景信号需连续出现 3 次以上才切换

  # 允许用户在 UI 中手动覆盖自动判断
  allow_manual_override: true

  # 记录每次场景判断的日志（用于后续 Reflection Loop 分析）
  log_decisions: true
  log_path: "data/feedback/scenario_decisions.jsonl"

# ---------------------------------------------------------------------------
# 联系人场景标签缓存策略
# ---------------------------------------------------------------------------
contact_cache:
  # 联系人场景标签的有效期（天）
  # 超过此时间未有新对话，标签权重逐渐衰减
  tag_validity_days: 30

  # 每次对话后是否自动更新联系人标签
  auto_update_on_chat: true

  # 缓存文件路径
  cache_path: "data/contacts/scenario_cache.json"

# ---------------------------------------------------------------------------
# 子场景细分（Intimate 场景内部分类，对应 intimate.md 中的细分模板）
# ---------------------------------------------------------------------------
intimate_sub_types:
  - id: "daily_care"
    label: "日常关怀"
    trigger_patterns:
      - "最近.*怎么样"
      - "吃了.*吗"
      - "睡.*好吗"
      - "身体.*好吗"

  - id: "affection"
    label: "亲密表达"
    trigger_patterns:
      - "想你"
      - "爱你"
      - "想.*了"

  - id: "humor"
    label: "轻松幽默"
    trigger_patterns:
      - "哈哈哈"
      - "笑死"
      - "绷不住"
      - "好笑"

  - id: "emotional_support"
    label: "情绪支撑"
    trigger_patterns:
      - "好累"
      - "好烦"
      - "压力"
      - "好难过"
      - "失望"
      - "崩溃"

  - id: "coordination"
    label: "生活协调"
    trigger_patterns:
      - "几点"
      - "在哪"
      - "一起.*吗"
      - "今晚"
      - "周末"
      - "约"
