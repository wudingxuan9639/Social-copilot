# =============================================================================
# config/models.yaml
# 多模型路由配置文件 (Multi-Model Routing Configuration)
# =============================================================================
#
# 用途：
#   定义各使用场景（商务 / 亲密 / 默认）所对应的 AI 模型接入参数。
#   本文件由用户直接编辑，或通过 UI 设置面板自动写入。
#
# 安全说明：
#   API Key 支持两种方式填写：
#     1. 明文填写（仅限本地开发，生产环境不推荐）
#     2. 环境变量引用：使用 ${ENV_VAR_NAME} 语法（推荐）
#
#   secrets.yaml（如存在）中的密钥会覆盖此文件中的同名字段，
#   且 secrets.yaml 已加入 .gitignore，不会被提交到版本库。
#
# =============================================================================

# ------------------------------------------------------------
# 全局设置
# ------------------------------------------------------------
global:
  # 请求超时（秒）
  timeout_seconds: 10

  # 单次补全最大等待时间（秒），超时后降级到 fallback 模型
  generation_timeout_seconds: 5

  # 是否开启 Token 用量日志（记录在本地 logs/ 目录，不上传）
  log_token_usage: true

  # Ghost Text 触发防抖延迟（毫秒），用户停止输入后延迟此时间再请求
  ghost_text_debounce_ms: 400

  # 降级策略：当主模型超时或出错时，是否自动切换到 fallback 模型
  enable_fallback: true


# ------------------------------------------------------------
# 商务场景模型配置 (Business Scenario)
# 推荐：DeepSeek（逻辑严密、专业术语表现优秀）
# ------------------------------------------------------------
business:
  provider: deepseek
  base_url: "https://api.deepseek.com/v1"

  # 推荐使用环境变量：export DEEPSEEK_API_KEY=sk-xxxxx
  api_key: "${DEEPSEEK_API_KEY}"

  # 可选模型：deepseek-chat / deepseek-reasoner
  model: "deepseek-chat"

  # 商务场景建议降低温度，提高输出确定性
  temperature: 0.4

  # Ghost Text 补全的最大 Token 数（建议 128~512，避免过长输出）
  max_tokens: 512

  # 系统提示词模板路径（相对于项目根目录）
  prompt_template: "brain/scenario/prompt_templates/business.md"

  # 上下文历史消息条数（传入 API 的最近 N 条对话）
  context_history_limit: 5

  # 是否启用 RAG 知识库补充
  rag_enabled: true
  rag_scenario_filter: "business"


# ------------------------------------------------------------
# 亲密场景模型配置 (Intimate Scenario)
# 推荐：豆包（拟人化表达、情感共鸣表现优秀）
# ------------------------------------------------------------
intimate:
  provider: doubao
  base_url: "https://ark.cn-beijing.volces.com/api/v3"

  # 推荐使用环境变量：export DOUBAO_API_KEY=xxxxx
  api_key: "${DOUBAO_API_KEY}"

  # 豆包使用 endpoint_id 作为模型标识，在火山引擎控制台获取
  # 格式示例：ep-20240101120000-xxxxx
  model: "${DOUBAO_ENDPOINT_ID}"

  # 亲密场景适当提高温度，增加表达多样性
  temperature: 0.85

  max_tokens: 256

  prompt_template: "brain/scenario/prompt_templates/intimate.md"

  context_history_limit: 8

  rag_enabled: true
  rag_scenario_filter: "intimate"


# ------------------------------------------------------------
# 默认 / 通用场景模型配置 (Default / General)
# 适用：联系人等级未知、混合场景或用户手动覆盖时的兜底配置
# 使用标准 OpenAI 协议，支持任何兼容端点
# ------------------------------------------------------------
default:
  provider: openai_compatible
  base_url: "https://api.openai.com/v1"

  # 推荐使用环境变量：export OPENAI_API_KEY=sk-xxxxx
  api_key: "${OPENAI_API_KEY}"

  model: "gpt-4o-mini"

  temperature: 0.7

  max_tokens: 512

  prompt_template: "brain/scenario/prompt_templates/business.md"

  context_history_limit: 5

  rag_enabled: false
  rag_scenario_filter: "shared"


# ------------------------------------------------------------
# 降级模型配置 (Fallback)
# 当主模型超时、认证失败或 API 限速时自动切换到此配置
# 建议配置一个稳定性高、低延迟的轻量模型
# ------------------------------------------------------------
fallback:
  provider: openai_compatible
  base_url: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-4o-mini"
  temperature: 0.6
  max_tokens: 256
  rag_enabled: false


# ------------------------------------------------------------
# 自定义服务商预设（可选扩展）
# 用户可在此处添加任意兼容 OpenAI 协议的自托管或第三方服务
# ------------------------------------------------------------
custom_providers:

  # 示例：本地部署的 Ollama 实例
  # ollama_local:
  #   provider: ollama
  #   base_url: "http://localhost:11434/v1"
  #   api_key: "ollama"          # Ollama 本地无需真实 Key
  #   model: "qwen2.5:7b"
  #   temperature: 0.7
  #   max_tokens: 512

  # 示例：通义千问（阿里云 DashScope）
  # qwen:
  #   provider: qwen
  #   base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  #   api_key: "${DASHSCOPE_API_KEY}"
  #   model: "qwen-plus"
  #   temperature: 0.7
  #   max_tokens: 512


# ------------------------------------------------------------
# RAG 检索配置
# ------------------------------------------------------------
rag:
  # 本地 Embedding 模型（sentence-transformers 格式，离线运行，无需联网）
  # 中文推荐：BAAI/bge-small-zh-v1.5 （约 90MB，效果均衡）
  # 多语言推荐：BAAI/bge-m3 （约 570MB，中英混合场景更优）
  embedding_model: "BAAI/bge-small-zh-v1.5"

  # ChromaDB 向量索引持久化路径（相对于项目根目录）
  db_path: "data/rag_index"

  # 文本分块大小（Token 数）
  chunk_size: 512

  # 相邻分块重叠 Token 数（提升跨块语义连续性）
  chunk_overlap: 64

  # 每次检索返回的最相关块数
  top_k: 3

  # 最低相似度阈值（低于此分数的检索结果将被过滤，0.0~1.0）
  min_similarity_score: 0.5
