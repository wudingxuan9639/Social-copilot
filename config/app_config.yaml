# ─────────────────────────────────────────────────────────────────────────────
# Social Copilot — 应用主配置文件
# app_config.yaml
# ─────────────────────────────────────────────────────────────────────────────
# 说明：
#   本文件为应用全局配置，控制各模块的运行参数。
#   API Key 等敏感信息请勿写在此处，统一写入 config/secrets.yaml
#   或通过环境变量注入（secrets.yaml 已在 .gitignore 中排除）。
# ─────────────────────────────────────────────────────────────────────────────

app:
  name: "Social Copilot"
  version: "0.1.0"
  # 日志级别：DEBUG | INFO | WARNING | ERROR
  log_level: INFO
  # 日志文件路径（相对于项目根目录）
  log_file: logs/social_copilot.log
  # 日志最大保留天数
  log_retention_days: 7
  # 语言 / 地区
  locale: zh-CN


# ─────────────────────────────────────────────────────────────────────────────
# 本地 Skill 蒸馏器 (Skill Distiller)
# 对应模块：core/skill_distiller/
# ─────────────────────────────────────────────────────────────────────────────
skill:
  # myself.skill 文件的存储路径（相对于项目根目录）
  output_path: data/skill/myself.skill
  # Skill 备份目录（每次重新蒸馏前自动备份）
  backup_dir: data/skill/backups/
  # 最多保留的历史版本数
  max_backups: 5
  # 加密算法：fernet | aes-256-gcm
  encryption: fernet
  # 特征提取配置
  extraction:
    # 高频词统计：最多保留 TOP N 个短语
    top_phrases: 200
    # 最短保留的短语字符数（过滤单字噪音）
    min_phrase_length: 2
    # 语料扫描的最大消息条数（控制蒸馏耗时）
    max_messages: 50000
    # 是否提取 Emoji 使用习惯
    extract_emoji: true
    # 是否提取称谓习惯（你/您/哥/老师等）
    extract_address_habits: true


# ─────────────────────────────────────────────────────────────────────────────
# 联系人分类 (Identity Mapping)
# 对应模块：core/identity/
# ─────────────────────────────────────────────────────────────────────────────
identity:
  # 联系人分类缓存文件路径
  cache_path: data/contacts/contacts_cache.json
  # 缓存有效期（天）。超过后自动触发重新分类
  cache_ttl_days: 7
  # 联系人等级划分阈值
  tier_thresholds:
    # 近 30 天消息数 >= N 视为高频联系人
    high_frequency_min_messages: 20
    # 关键词命中数 >= N 才划入对应场景
    business_keyword_hit_min: 3
    intimate_keyword_hit_min: 2


# ─────────────────────────────────────────────────────────────────────────────
# 语气档位默认设置 (Tone Mask)
# 对应模块：core/tone/
# ─────────────────────────────────────────────────────────────────────────────
tone:
  # 默认语气档位：professional | warm | minimal
  default_preset: warm
  # 是否记忆每个联系人的上次语气设置
  remember_per_contact: true


# ─────────────────────────────────────────────────────────────────────────────
# 反思学习 (Reflection Loop)
# 对应模块：core/reflection/
# ─────────────────────────────────────────────────────────────────────────────
reflection:
  # 反馈记录存储目录
  feedback_dir: data/feedback/
  # 触发 Skill 更新所需的最低反馈积累条数
  update_threshold: 10
  # 单次语义差异低于该分值时，忽略本次偏差（过滤微小改动）
  min_semantic_diff_score: 0.15
  # 是否开启自动 Skill 微调（false = 仅记录，不自动更新 Skill）
  auto_update_skill: false


# ─────────────────────────────────────────────────────────────────────────────
# RAG 知识库 (Retrieval-Augmented Generation)
# 对应模块：brain/rag/
# ─────────────────────────────────────────────────────────────────────────────
rag:
  # 本地知识库 Markdown 文件目录
  knowledge_base_dir: brain/rag/knowledge_base/
  # 向量索引持久化路径
  db_path: data/rag_index/
  # 本地 Embedding 模型（sentence-transformers 格式，优先选中文小模型）
  embedding_model: BAAI/bge-small-zh-v1.5
  # 文档分块大小（token 数）
  chunk_size: 512
  # 相邻块重叠 token 数（提高语义边界召回率）
  chunk_overlap: 64
  # 单次检索返回的最大块数
  top_k: 3
  # 是否在应用启动时自动检查并更新向量索引
  auto_refresh_on_start: true


# ─────────────────────────────────────────────────────────────────────────────
# 屏幕探针 (Screen Probe)
# 对应模块：probe/
# ─────────────────────────────────────────────────────────────────────────────
probe:
  # 首选探针类型（按平台自动选择，也可手动指定）
  # macOS: accessibility | vision_ocr
  # windows: uiautomation | screenshot_ocr
  preferred_macos: accessibility
  preferred_windows: uiautomation
  # 输入框轮询间隔（毫秒）。建议 200~500ms
  poll_interval_ms: 300
  # 防抖延迟（毫秒）：用户停止输入多久后才触发 AI 补全请求
  debounce_ms: 500
  # 读取的最近消息条数（用于构造对话上下文）
  context_message_limit: 10
  # 截图 OCR 备选方案的最小触发条件（accessibility 连续失败次数）
  ocr_fallback_after_failures: 3


# ─────────────────────────────────────────────────────────────────────────────
# UI 侧边栏 (Sidebar UI)
# 对应模块：ui/
# ─────────────────────────────────────────────────────────────────────────────
ui:
  # 侧边栏默认宽度（像素）
  sidebar_width: 320
  # 最小宽度
  sidebar_min_width: 240
  # 主题：dark | light（当前仅支持 dark，极客风格）
  theme: dark
  # 幽灵文本颜色（CSS hex）
  ghost_text_color: "#AAAAAA"
  # 建议卡片最大显示数量
  max_suggestion_cards: 3
  # 流式输出：是否逐 token 实时刷新 Ghost Text（false = 等待完整结果后一次性展示）
  streaming: true
  # Tab 键采纳模式：clipboard | auto_inject
  # clipboard  : 采纳后复制到剪贴板（默认，非侵入）
  # auto_inject: 自动注入微信输入框（需 Accessibility 权限授权）
  tab_acceptance_mode: clipboard
  # 建议卡片自动消失超时（秒）。0 = 不自动消失
  suggestion_timeout_seconds: 0
  # 是否在侧边栏底部显示 Token 用量与 API 成本估算
  show_token_usage: true


# ─────────────────────────────────────────────────────────────────────────────
# 场景识别 (Scenario Detection)
# 对应模块：brain/scenario/
# ─────────────────────────────────────────────────────────────────────────────
scenario:
  # 场景识别置信度阈值：低于该值时回落到 default 场景
  confidence_threshold: 0.6
  # 当联系人未分类（UNKNOWN tier）时的默认场景
  default_scenario: business
  # 场景覆盖记录路径（用户手动覆盖自动判断结果的缓存）
  override_cache_path: data/contacts/scenario_overrides.json


# ─────────────────────────────────────────────────────────────────────────────
# 开发 / 调试模式
# ─────────────────────────────────────────────────────────────────────────────
dev:
  # 是否开启调试模式（会输出更多日志，打印 Prompt 内容等）
  debug: false
  # 是否使用 Mock Probe（不依赖真实微信进程，用于本地开发测试）
  mock_probe: false
  # Mock 输入文字（mock_probe=true 时使用）
  mock_input_text: "关于这次方案的对接，我觉得"
  # 是否跳过 API 调用，返回本地 fixture 数据（用于 UI 开发）
  mock_brain: false
